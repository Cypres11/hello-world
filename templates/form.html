<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ action }} Contact – Contact Database</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>body { background: #f8f9fa; }</style>
</head>
<body>
<div class="container py-4" style="max-width: 600px;">

  <a href="{{ url_for('index') }}" class="btn btn-link ps-0 mb-3">
    <i class="bi bi-arrow-left"></i> Back to contacts
  </a>

  <div class="card shadow-sm">
    <div class="card-header bg-primary text-white">
      <h5 class="mb-0">
        <i class="bi bi-person-{{ 'pencil' if contact else 'plus' }}-fill me-2"></i>{{ action }} Contact
      </h5>
    </div>
    <div class="card-body">

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>
        {% endfor %}
      {% endwith %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Name <span class="text-danger">*</span></label>
          <input type="text" name="name" class="form-control" required autofocus
                 value="{{ contact.name if contact else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input type="email" name="email" class="form-control"
                 value="{{ contact.email if contact else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Phone</label>
          <input type="tel" name="phone" class="form-control"
                 value="{{ contact.phone if contact else '' }}">
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Address</label>
          <input type="text" name="address" class="form-control"
                 value="{{ contact.address if contact else '' }}">
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Notes</label>
          <textarea name="notes" class="form-control" rows="3">{{ contact.notes if contact else '' }}</textarea>
        </div>
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-primary">
            <i class="bi bi-check-lg me-1"></i>{{ action }}
          </button>
          <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">Cancel</a>
        </div>
      </form>

    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
